# =============================================================================
# ADD inside the server {} block of your nginx site config
# File: nginx/conf.d/YOUR-SITE.conf
# =============================================================================

# Nginx stub_status — required for nginx_exporter (Prometheus metrics)
# Internal access only — Docker bridge network range
location /stub_status {
    stub_status on;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    deny  all;
    access_log off;
}

# =============================================================================
# ADD as a separate server block in the same file (or a new file)
#
# nginx_exporter reaches Nginx via the Docker service name "web-server"
# (NGINX_STUB_STATUS_URL=http://web-server/stub_status in .env).
# Nginx must therefore have a server block that accepts requests for that
# hostname; the default_server or your site's server_name may not match it.
# This dedicated block handles it on port 80 — internal only.
# =============================================================================

server {
    listen 80;
    server_name web-server;

    location /stub_status {
        stub_status on;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny  all;
        access_log off;
    }

    # Block everything else on this internal vhost
    location / {
        return 444;
    }
}

# =============================================================================
# OPTIONAL — Expose Grafana via your domain at /monitoring/
# Replace the allow directive with your university/office subnet
# =============================================================================

location /monitoring/ {
    proxy_pass http://lf_monitor_grafana:3000/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Restrict access — replace with your internal IP range
    # allow 10.0.0.0/8;
    # deny  all;
}
