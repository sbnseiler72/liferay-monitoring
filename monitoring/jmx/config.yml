# =============================================================================
# JMX Exporter config for Liferay 7.x / Tomcat 9 / HikariCP
# hostPort is read from environment variable substitution at runtime
#
# Metric names follow the Micrometer convention so Grafana dashboard 8563
# ("JVM overview (Micrometer)", ID 8563) works without modification.
# Alert rules in alerts.yml use the same names.
#
# jmx_exporter is first-match-wins: each MBean attribute must appear in
# exactly ONE rule — duplicate patterns for the same attribute are ignored.
# =============================================================================

hostPort: "${LIFERAY_JMX_HOST}:${LIFERAY_JMX_PORT}"
ssl: false
lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:

  # ---------------------------------------------------------------------------
  # JVM Heap Memory (Micrometer names — used by dashboard 8563 and alert rules)
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>used'
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "JVM heap memory used in bytes"
    labels:
      area: heap
      id: "Heap"

  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>max'
    name: jvm_memory_max_bytes
    type: GAUGE
    help: "JVM heap memory max in bytes"
    labels:
      area: heap
      id: "Heap"

  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>committed'
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "JVM heap memory committed in bytes"
    labels:
      area: heap
      id: "Heap"

  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>init'
    name: jvm_memory_init_bytes
    type: GAUGE
    help: "JVM heap memory initial allocation in bytes"
    labels:
      area: heap
      id: "Heap"

  # ---------------------------------------------------------------------------
  # JVM Non-Heap / Metaspace (Micrometer names)
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=Memory><NonHeapMemoryUsage>used'
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "JVM non-heap memory used in bytes"
    labels:
      area: nonheap
      id: "Metaspace"

  - pattern: 'java.lang<type=Memory><NonHeapMemoryUsage>max'
    name: jvm_memory_max_bytes
    type: GAUGE
    help: "JVM non-heap memory max in bytes"
    labels:
      area: nonheap
      id: "Metaspace"

  - pattern: 'java.lang<type=Memory><NonHeapMemoryUsage>committed'
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "JVM non-heap memory committed in bytes"
    labels:
      area: nonheap
      id: "Metaspace"

  # ---------------------------------------------------------------------------
  # JVM Memory Pools — per-pool breakdown (G1 heap regions + nonheap pools)
  # Dashboard 8563 uses jvm_memory_used_bytes{id="<pool name>"} for pool charts.
  # Heap pools: G1 Eden Space, G1 Old Gen, G1 Survivor Space
  # Nonheap pools: Metaspace, CodeHeap, Compressed Class Space
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=MemoryPool,name=G1 Eden Space><Usage>used'
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "G1 Eden Space used bytes"
    labels:
      area: heap
      id: "G1 Eden Space"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Eden Space><Usage>max'
    name: jvm_memory_max_bytes
    type: GAUGE
    help: "G1 Eden Space max bytes"
    labels:
      area: heap
      id: "G1 Eden Space"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Eden Space><Usage>committed'
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "G1 Eden Space committed bytes"
    labels:
      area: heap
      id: "G1 Eden Space"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Old Gen><Usage>used'
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "G1 Old Gen used bytes"
    labels:
      area: heap
      id: "G1 Old Gen"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Old Gen><Usage>max'
    name: jvm_memory_max_bytes
    type: GAUGE
    help: "G1 Old Gen max bytes"
    labels:
      area: heap
      id: "G1 Old Gen"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Old Gen><Usage>committed'
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "G1 Old Gen committed bytes"
    labels:
      area: heap
      id: "G1 Old Gen"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Survivor Space><Usage>used'
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "G1 Survivor Space used bytes"
    labels:
      area: heap
      id: "G1 Survivor Space"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Survivor Space><Usage>max'
    name: jvm_memory_max_bytes
    type: GAUGE
    help: "G1 Survivor Space max bytes"
    labels:
      area: heap
      id: "G1 Survivor Space"

  - pattern: 'java.lang<type=MemoryPool,name=G1 Survivor Space><Usage>committed'
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "G1 Survivor Space committed bytes"
    labels:
      area: heap
      id: "G1 Survivor Space"

  - pattern: 'java.lang<type=MemoryPool,name=Metaspace><Usage>used'
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "Metaspace pool used bytes"
    labels:
      area: nonheap
      id: "Metaspace"

  - pattern: 'java.lang<type=MemoryPool,name=Metaspace><Usage>max'
    name: jvm_memory_max_bytes
    type: GAUGE
    help: "Metaspace pool max bytes"
    labels:
      area: nonheap
      id: "Metaspace"

  - pattern: 'java.lang<type=MemoryPool,name=Metaspace><Usage>committed'
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "Metaspace pool committed bytes"
    labels:
      area: nonheap
      id: "Metaspace"

  - pattern: "java.lang<type=MemoryPool,name=CodeHeap 'non-nmethods'><Usage>used"
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "CodeHeap non-nmethods used bytes"
    labels:
      area: nonheap
      id: "CodeHeap 'non-nmethods'"

  - pattern: "java.lang<type=MemoryPool,name=CodeHeap 'non-nmethods'><Usage>committed"
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "CodeHeap non-nmethods committed bytes"
    labels:
      area: nonheap
      id: "CodeHeap 'non-nmethods'"

  - pattern: "java.lang<type=MemoryPool,name=CodeHeap 'profiled nmethods'><Usage>used"
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "CodeHeap profiled nmethods used bytes"
    labels:
      area: nonheap
      id: "CodeHeap 'profiled nmethods'"

  - pattern: "java.lang<type=MemoryPool,name=CodeHeap 'profiled nmethods'><Usage>committed"
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "CodeHeap profiled nmethods committed bytes"
    labels:
      area: nonheap
      id: "CodeHeap 'profiled nmethods'"

  - pattern: "java.lang<type=MemoryPool,name=CodeHeap 'non-profiled nmethods'><Usage>used"
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "CodeHeap non-profiled nmethods used bytes"
    labels:
      area: nonheap
      id: "CodeHeap 'non-profiled nmethods'"

  - pattern: "java.lang<type=MemoryPool,name=CodeHeap 'non-profiled nmethods'><Usage>committed"
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "CodeHeap non-profiled nmethods committed bytes"
    labels:
      area: nonheap
      id: "CodeHeap 'non-profiled nmethods'"

  - pattern: 'java.lang<type=MemoryPool,name=Compressed Class Space><Usage>used'
    name: jvm_memory_used_bytes
    type: GAUGE
    help: "Compressed Class Space used bytes"
    labels:
      area: nonheap
      id: "Compressed Class Space"

  - pattern: 'java.lang<type=MemoryPool,name=Compressed Class Space><Usage>max'
    name: jvm_memory_max_bytes
    type: GAUGE
    help: "Compressed Class Space max bytes"
    labels:
      area: nonheap
      id: "Compressed Class Space"

  - pattern: 'java.lang<type=MemoryPool,name=Compressed Class Space><Usage>committed'
    name: jvm_memory_committed_bytes
    type: GAUGE
    help: "Compressed Class Space committed bytes"
    labels:
      area: nonheap
      id: "Compressed Class Space"

  # ---------------------------------------------------------------------------
  # NIO Buffer Pools — direct and mapped buffers (dashboard 8563 buffer section)
  # ---------------------------------------------------------------------------
  - pattern: 'java.nio<type=BufferPool,name=(.*)><>MemoryUsed'
    name: jvm_buffer_memory_used_bytes
    type: GAUGE
    help: "NIO buffer pool memory used bytes"
    labels:
      id: "$1"

  - pattern: 'java.nio<type=BufferPool,name=(.*)><>Count'
    name: jvm_buffer_count_buffers
    type: GAUGE
    help: "NIO buffer pool buffer count"
    labels:
      id: "$1"

  - pattern: 'java.nio<type=BufferPool,name=(.*)><>TotalCapacity'
    name: jvm_buffer_total_capacity_bytes
    type: GAUGE
    help: "NIO buffer pool total capacity bytes"
    labels:
      id: "$1"

  # ---------------------------------------------------------------------------
  # G1GC — Young Generation (frequent, short pauses)
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=GarbageCollector,name=G1 Young Generation><>CollectionCount'
    name: jvm_gc_pause_seconds_count
    type: COUNTER
    help: "G1 Young Generation GC collection count"
    labels:
      action: "end of minor GC"
      cause: "G1 Evacuation Pause"

  - pattern: 'java.lang<type=GarbageCollector,name=G1 Young Generation><>CollectionTime'
    name: jvm_gc_pause_seconds_sum
    type: COUNTER
    help: "G1 Young Generation GC total time in ms"
    labels:
      action: "end of minor GC"
      cause: "G1 Evacuation Pause"

  # ---------------------------------------------------------------------------
  # G1GC — Old Generation (rare, long pauses — crash precursor)
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=GarbageCollector,name=G1 Old Generation><>CollectionCount'
    name: jvm_gc_pause_seconds_count
    type: COUNTER
    help: "G1 Old Generation GC count — non-zero means Full GC occurred"
    labels:
      action: "end of major GC"
      cause: "G1 Humongous Allocation"

  - pattern: 'java.lang<type=GarbageCollector,name=G1 Old Generation><>CollectionTime'
    name: jvm_gc_pause_seconds_sum
    type: COUNTER
    help: "G1 Old Generation GC total time in ms"
    labels:
      action: "end of major GC"
      cause: "G1 Humongous Allocation"

  # ---------------------------------------------------------------------------
  # Tomcat Thread Pool — http-nio-8080
  # ---------------------------------------------------------------------------
  - pattern: 'Catalina<type=ThreadPool,name="http-nio-8080"><>currentThreadCount'
    name: tomcat_threads_current
    type: GAUGE
    help: "Tomcat current thread count"

  - pattern: 'Catalina<type=ThreadPool,name="http-nio-8080"><>currentThreadsBusy'
    name: tomcat_threads_busy
    type: GAUGE
    help: "Tomcat busy threads — high value means thread pool pressure"

  - pattern: 'Catalina<type=ThreadPool,name="http-nio-8080"><>maxThreads'
    name: tomcat_threads_max
    type: GAUGE
    help: "Tomcat max thread pool size"

  - pattern: 'Catalina<type=ThreadPool,name="http-nio-8080"><>connectionCount'
    name: tomcat_connections_current
    type: GAUGE
    help: "Tomcat current active connections"

  - pattern: 'Catalina<type=ThreadPool,name="http-nio-8080"><>acceptCount'
    name: tomcat_accept_count
    type: GAUGE
    help: "Tomcat accept queue length"

  # ---------------------------------------------------------------------------
  # Tomcat Request Processor
  # ---------------------------------------------------------------------------
  - pattern: 'Catalina<type=GlobalRequestProcessor,name="http-nio-8080"><>requestCount'
    name: tomcat_request_count_total
    type: COUNTER
    help: "Tomcat total requests processed"

  - pattern: 'Catalina<type=GlobalRequestProcessor,name="http-nio-8080"><>errorCount'
    name: tomcat_error_count_total
    type: COUNTER
    help: "Tomcat total error responses"

  - pattern: 'Catalina<type=GlobalRequestProcessor,name="http-nio-8080"><>processingTime'
    name: tomcat_processing_time_ms_total
    type: COUNTER
    help: "Tomcat total request processing time in ms"

  - pattern: 'Catalina<type=GlobalRequestProcessor,name="http-nio-8080"><>bytesReceived'
    name: tomcat_bytes_received_total
    type: COUNTER
    help: "Tomcat total bytes received"

  - pattern: 'Catalina<type=GlobalRequestProcessor,name="http-nio-8080"><>bytesSent'
    name: tomcat_bytes_sent_total
    type: COUNTER
    help: "Tomcat total bytes sent"

  # ---------------------------------------------------------------------------
  # HikariCP Connection Pool
  # ---------------------------------------------------------------------------
  - pattern: 'com.zaxxer.hikari<type=Pool \(.*\)><>ActiveConnections'
    name: hikaricp_active_connections
    type: GAUGE
    help: "HikariCP active DB connections"

  - pattern: 'com.zaxxer.hikari<type=Pool \(.*\)><>PendingConnections'
    name: hikaricp_pending_connections
    type: GAUGE
    help: "HikariCP threads waiting for a connection — non-zero means DB bottleneck"

  - pattern: 'com.zaxxer.hikari<type=Pool \(.*\)><>IdleConnections'
    name: hikaricp_idle_connections
    type: GAUGE
    help: "HikariCP idle connections"

  - pattern: 'com.zaxxer.hikari<type=Pool \(.*\)><>TotalConnections'
    name: hikaricp_total_connections
    type: GAUGE
    help: "HikariCP total connections in pool"

  # ---------------------------------------------------------------------------
  # OS / System metrics
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=OperatingSystem><>OpenFileDescriptorCount'
    name: process_files_open_files
    type: GAUGE
    help: "JVM open file descriptor count"

  - pattern: 'java.lang<type=OperatingSystem><>MaxFileDescriptorCount'
    name: process_files_max_files
    type: GAUGE
    help: "JVM max file descriptor limit"

  - pattern: 'java.lang<type=OperatingSystem><>SystemCpuLoad'
    name: system_cpu_usage
    type: GAUGE
    help: "System-wide CPU load (0.0-1.0)"

  - pattern: 'java.lang<type=OperatingSystem><>ProcessCpuLoad'
    name: process_cpu_usage
    type: GAUGE
    help: "JVM process CPU load (0.0-1.0)"

  - pattern: 'java.lang<type=OperatingSystem><>AvailableProcessors'
    name: system_cpu_count
    type: GAUGE
    help: "Number of available CPU processors"

  - pattern: 'java.lang<type=OperatingSystem><>SystemLoadAverage'
    name: system_load_average_1m
    type: GAUGE
    help: "System load average for the last minute"

  - pattern: 'java.lang<type=OperatingSystem><>FreePhysicalMemorySize'
    name: os_free_memory_bytes
    type: GAUGE
    help: "OS free physical memory in bytes"

  - pattern: 'java.lang<type=OperatingSystem><>TotalPhysicalMemorySize'
    name: os_total_memory_bytes
    type: GAUGE
    help: "OS total physical memory in bytes"

  # ---------------------------------------------------------------------------
  # JVM Threads (Micrometer names)
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=Threading><>ThreadCount'
    name: jvm_threads_live_threads
    type: GAUGE
    help: "JVM live thread count"

  - pattern: 'java.lang<type=Threading><>DaemonThreadCount'
    name: jvm_threads_daemon_threads
    type: GAUGE
    help: "JVM daemon thread count"

  - pattern: 'java.lang<type=Threading><>PeakThreadCount'
    name: jvm_threads_peak_threads
    type: GAUGE
    help: "JVM peak thread count since JVM start or last reset"

  - pattern: 'java.lang<type=Threading><>TotalStartedThreadCount'
    name: jvm_threads_started_threads_total
    type: COUNTER
    help: "JVM total threads started since JVM start"

  # ---------------------------------------------------------------------------
  # JVM Class Loading (Micrometer names)
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=ClassLoading><>LoadedClassCount'
    name: jvm_classes_loaded_classes
    type: GAUGE
    help: "JVM currently loaded class count"

  - pattern: 'java.lang<type=ClassLoading><>UnloadedClassCount'
    name: jvm_classes_unloaded_classes_total
    type: COUNTER
    help: "JVM total unloaded class count since JVM start"

  # ---------------------------------------------------------------------------
  # Process Uptime
  # ---------------------------------------------------------------------------
  - pattern: 'java.lang<type=Runtime><>Uptime'
    name: process_uptime_seconds
    type: GAUGE
    help: "JVM uptime in milliseconds since start"

  - pattern: 'java.lang<type=Runtime><>StartTime'
    name: process_start_time_seconds
    type: GAUGE
    help: "JVM start time in milliseconds since epoch"
