# Debug config — captures raw bean strings to verify exact pattern format.
# Run temporarily; do not use in production.

hostPort: "${LIFERAY_JMX_HOST}:${LIFERAY_JMX_PORT}"
ssl: false
lowercaseOutputName: false
lowercaseOutputLabelNames: false

rules:
  # GC beans — type value "GarbageCollector" is the prefix in multi-key format
  - pattern: "(.*GarbageCollector.*)"
    name: debug_gc
    value: 1
    type: GAUGE
    labels:
      bean: "$1"

  # Tomcat ThreadPool — domain "Catalina" is dropped; type value "ThreadPool" is prefix
  - pattern: "(.*ThreadPool.*)"
    name: debug_threadpool
    value: 1
    type: GAUGE
    labels:
      bean: "$1"

  # Tomcat GlobalRequestProcessor
  - pattern: "(.*GlobalRequestProcessor.*)"
    name: debug_requestprocessor
    value: 1
    type: GAUGE
    labels:
      bean: "$1"

  # MemoryPool — already confirmed working
  - pattern: "(.*MemoryPool.*)"
    name: debug_mempool
    value: 1
    type: GAUGE
    labels:
      bean: "$1"

  # BufferPool — already confirmed working
  - pattern: "(.*BufferPool.*)"
    name: debug_bufpool
    value: 1
    type: GAUGE
    labels:
      bean: "$1"

  # HikariCP
  - pattern: "(.*[Hh]ikari.*)"
    name: debug_hikari
    value: 1
    type: GAUGE
    labels:
      bean: "$1"

  # Broad catch-all for anything with "Collect" in case GC uses different naming
  - pattern: "(.*[Cc]ollect.*)"
    name: debug_collect
    value: 1
    type: GAUGE
    labels:
      bean: "$1"
